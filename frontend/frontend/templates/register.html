<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register - Medical Prescription Recognition System">
    <title>Register - Medical Prescription System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-page">
    <!-- Main Content -->
    <main class="auth-container">
        <div class="auth-card-wrapper">
            <!-- Left Side - Image -->
            <div class="auth-image-section">
                <img src="{{ url_for('static', filename='images/login.png') }}" alt="Medical Prescription" class="auth-image">
            </div>
            
            <!-- Right Side - Form -->
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Create Account</h2>
                    <p>Join us to access prescription recognition features</p>
                </div>

                <!-- Alert Messages -->
                <div id="alertMessage" class="alert" style="display: none;"></div>

                <!-- Scrollable Form Container -->
                <div class="auth-form-container">
                    <!-- Registration Form -->
                    <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName" 
                        class="form-input" 
                        placeholder="Enter your full name"
                        required
                        autocomplete="name"
                    >
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        class="form-input" 
                        placeholder="Choose a username"
                        required
                        autocomplete="username"
                        pattern="[a-zA-Z0-9_]{3,50}"
                        title="Username must be 3-50 characters (letters, numbers, underscores only)"
                    >
                    <small class="form-hint">3-50 characters, letters, numbers and underscores only</small>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="Enter your email"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Create a password"
                        required
                        autocomplete="new-password"
                        minlength="6"
                    >
                    <small class="form-hint">Minimum 6 characters</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        class="form-input" 
                        placeholder="Confirm your password"
                        required
                        autocomplete="new-password"
                    >
                </div>

                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" name="role" class="form-input">
                        <option value="staff">Staff</option>
                        <option value="doctor">Doctor</option>
                        <option value="pharmacist">Pharmacist</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="acceptTerms" required>
                        <span>I agree to the <a href="#" class="auth-link">Terms & Conditions</a></span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader" style="display: none;">
                        <span class="spinner"></span> Creating account...
                    </span>
                </button>
            </form>
        </div>

        <div class="auth-footer">
            <p>Already have an account? <a href="/login" class="auth-link">Login here</a></p>
        </div>
    </div>
</div>

<!-- Back to Home Link -->
<div class="back-home">
    <a href="/" class="home-link">← Back to Home</a>
</div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2025 Medical Prescription Recognition System. All rights reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script>
        // Initialize registration page
        document.addEventListener('DOMContentLoaded', function() {
            initRegister();
        });
    </script>
</body>
</html>
