<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login - Medical Prescription Recognition System">
    <title>Login - Medical Prescription System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-page">
    <!-- Main Content -->
    <main class="auth-container">
        <div class="auth-card-wrapper">
            <!-- Left Side - Image -->
            <div class="auth-image-section">
                <img src="{{ url_for('static', filename='images/login.png') }}" alt="Medical Prescription" class="auth-image">
            </div>
            
            <!-- Right Side - Form -->
            <div class="auth-card">
                <div class="auth-header">
                <h2>Login</h2>
                <p>Welcome back! Please login to your account</p>
            </div>

            <!-- Alert Messages -->
            <div id="alertMessage" class="alert" style="display: none;"></div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        class="form-input" 
                        placeholder="Enter your username or email"
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                    <span class="btn-text">Login</span>
                    <span class="btn-loader" style="display: none;">
                        <span class="spinner"></span> Logging in...
                    </span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="/register" class="auth-link">Register here</a></p>
            </div>
            </div>
        </div>

        <!-- Back to Home Link -->
        <div class="back-home">
            <a href="/" class="home-link">← Back to Home</a>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2025 Medical Prescription Recognition System. All rights reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script>
        // Initialize login page
        document.addEventListener('DOMContentLoaded', function() {
            initLogin();
        });
    </script>
</body>
</html>
