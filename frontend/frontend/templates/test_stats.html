<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .stat-box {
            border: 2px solid #333;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .stat-box h3 {
            margin: 0 0 10px 0;
            color: #2563eb;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #16a34a;
        }
        #raw-json {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #1d4ed8;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <h1>Statistics API Test</h1>
    
    <button onclick="loadStats()">Reload Statistics</button>
    
    <div class="stat-box">
        <h3>Total Scans</h3>
        <div class="stat-value" id="totalScans">Loading...</div>
    </div>
    
    <div class="stat-box">
        <h3>Success Rate</h3>
        <div class="stat-value" id="successRate">Loading...</div>
    </div>
    
    <div class="stat-box">
        <h3>Average Confidence</h3>
        <div class="stat-value" id="avgConfidence">Loading...</div>
    </div>
    
    <div class="stat-box">
        <h3>Today's Scans</h3>
        <div class="stat-value" id="todayScans">Loading...</div>
    </div>
    
    <h2>Raw JSON Response:</h2>
    <div id="raw-json">No data loaded yet</div>
    
    <script>
        async function loadStats() {
            console.log('Loading statistics...');
            
            try {
                const url = window.location.origin + '/api/statistics';
                console.log('Fetching from:', url);
                
                const response = await fetch(url, {
                    method: 'GET',
                    credentials: 'same-origin',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Data received:', data);
                
                // Show raw JSON
                document.getElementById('raw-json').textContent = JSON.stringify(data, null, 2);
                
                if (data.success && data.statistics) {
                    const stats = data.statistics;
                    
                    document.getElementById('totalScans').textContent = stats.total_scans || 0;
                    document.getElementById('successRate').textContent = stats.success_rate ?
                        `${Math.round(stats.success_rate)}%` : '0%';
                    document.getElementById('avgConfidence').textContent = stats.average_confidence ?
                        `${Math.round(stats.average_confidence * 100)}%` : '0%';
                    document.getElementById('todayScans').textContent = stats.today_scans || 0;
                    
                    console.log('✓ Statistics loaded successfully');
                } else {
                    throw new Error('Invalid response structure');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('raw-json').innerHTML = 
                    `<span class="error">Error: ${error.message}</span>`;
                document.getElementById('totalScans').textContent = 'ERROR';
                document.getElementById('successRate').textContent = 'ERROR';
                document.getElementById('avgConfidence').textContent = 'ERROR';
                document.getElementById('todayScans').textContent = 'ERROR';
            }
        }
        
        // Load on page load
        window.addEventListener('DOMContentLoaded', loadStats);
    </script>
</body>
</html>
